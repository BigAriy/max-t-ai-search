<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AI Telegram Archive</title>
    <link rel="stylesheet" href="style.css?v=115">
</head>
<body>
    <!-- Шапка с профилем -->
    <header id="app-header">
        <div class="user-info">
            <span id="user-name">Загрузка...</span>
        </div>
        <button id="settings-btn">⚙️</button>
    </header>

    <main id="app-container">
        <!-- Гармошка 1: ИСТОЧНИКИ -->
        <div class="accordion active" id="source-section">
            <div class="accordion-header">
                <span class="step-num">1</span>
                <h3>ИСТОЧНИКИ</h3>
                <span class="status-badge" id="source-status">Выбрано: 0</span>
            </div>
            <div class="accordion-content">
                <div id="groups-list" class="list-container">
                    <!-- Загруженные источники -->
                </div>
                
                <div id="add-source-form" style="display:none; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px;">
                    <input type="text" id="new-group-url" placeholder="Ссылка или @username" onblur="previewSource()">
					
					<div id="preview-status" style="display:none; font-size: 13px; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px solid rgba(0,0,0,0.05); line-height: 1.4;"></div>
                    
                    <div id="topics-select" style="display:none; font-size: 12px; background: var(--secondary-bg); padding: 10px; border-radius: 8px; margin: 10px 0;">
                        <!-- Топики форума -->
                    </div>

                    <div class="form-row" id="all-topics-row">

                        <label>Обновление:</label>
                        <select id="update-freq">
                            <option value="daily">Раз в сутки</option>
                            <option value="hourly">Раз в час</option>
                            <option value="realtime">В реальном времени</option>
                        </select>
                    </div>
					
					
					

                    <div class="form-row">
                        <label>История:</label>
                        <select id="history-depth">
                            <option value="1">1 день</option>
                            <option value="7">Неделя</option>
                            <option value="30" selected>Месяц</option>
                            <option value="365">Год</option>
                            <option value="1825">5 лет</option>
                            <option value="0">Без ограничений</option>
                        </select>
					</div>					
					
					
                    <div class="form-row">
                        <label><input type="checkbox" id="all-topics" checked> Вся группа (все разделы)</label>
                    </div>
                    <button class="btn-primary" onclick="submitNewSource()">СОХРАНИТЬ</button>
                    <button class="btn-text" onclick="toggleAddForm()">Отмена</button>
                </div>
                
                <div class="source-controls" style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-tool" id="add-group-btn" onclick="toggleAddForm()" title="Добавить">+</button>
                    <button class="btn-tool" id="delete-group-btn" onclick="deleteSelected()" style="display:none; background: #e64646;">-</button>
                    <button class="btn-tool" id="sync-group-btn" onclick="syncSelected()" style="display:none; background: #31b545;">🔄</button>
                    <span id="selection-hint" style="font-size: 10px; color: var(--hint-color); align-self: center; margin-left: auto;"></span>
                </div>
            </div>
        </div>

        <!-- Гармошка 2: ФИЛЬТРЫ И АВТОМАТИКА -->
        <div class="accordion" id="filter-section">
            <div class="accordion-header">
                <span class="step-num">2</span>
                <h3>ФИЛЬТРЫ</h3>
                <span class="status-badge" id="filter-status">0 активных</span>
            </div>
            <div class="accordion-content">
                <div id="filters-list" class="list-container">
                    <p class="placeholder" style="font-size: 12px; color: var(--hint-color); text-align: center; padding: 10px;">У вас пока нет настроенных фильтров</p>
                </div>

                <div id="add-filter-form" style="display:none; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px; margin-top: 10px;">
                    <div class="form-row">
                        <label>Объект:</label>
                        <select id="filter-object">
                            <option value="messages">Сообщения</option>
                            <option value="users">Пользователи</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Тип:</label>
                        <select id="filter-type">
                            <option value="simple">Ключевые слова</option>
                            <option value="ai">ИИ (ситуация/роль)</option>
                        </select>
                    </div>
                    <input type="text" id="filter-trigger" placeholder="Ключевые слова или промпт">
                    
                    <div class="form-row" style="display: flex; gap: 15px; margin-top: 10px;">
                        <label style="font-size: 12px;"><input type="checkbox" id="f-notify" checked> Уведомлять</label>
                        <label style="font-size: 12px;"><input type="checkbox" id="f-save" checked> Сохранять</label>
                    </div>

                    <button class="btn-primary" style="margin-top: 15px;" onclick="submitNewFilter()">СОХРАНИТЬ ФИЛЬТР</button>
                    <button class="btn-text" style="width:100%; margin-top:10px; background:none; border:none; color:var(--hint-color);" onclick="toggleFilterForm()">Отмена</button>
                </div>

                <div class="filter-controls" style="margin-top: 15px;">
                    <button class="btn-tool" id="add-filter-btn" onclick="toggleFilterForm()" title="Создать фильтр">+</button>
                </div>
            </div>
        </div>

        <!-- Гармошка 3: ИНСТРУМЕНТЫ -->
        <div class="accordion" id="action-section">
            <div class="accordion-header">
                <span class="step-num">3</span>
                <h3>ИНСТРУМЕНТЫ</h3>
            </div>
            <div class="accordion-content">
                <!-- 1. Период дат -->
                <div class="tool-dates" style="margin-bottom: 15px;">
                    <div class="date-row">
                        <input type="date" id="date-from">
                        <button class="btn-small" onclick="setBeginningDate()">С начала</button>
                    </div>
                    <div class="date-row">
                        <input type="date" id="date-to">
                        <button class="btn-small" onclick="setTodayDate()">Сегодня</button>
                    </div>
                </div>

                <!-- 2. Выбор режима -->
                <div class="mode-switcher">
                    <button class="mode-btn active" id="btn-mode-search" onclick="switchToolMode('search')">ПОИСК</button>
                    <button class="mode-btn" id="btn-mode-chat" onclick="switchToolMode('chat')">ИИ-ЧАТ</button>
                    <button class="mode-btn" id="btn-mode-analysis" onclick="switchToolMode('analysis')">АНАЛИЗ</button>
                </div>

                <!-- 3. Динамические настройки -->
                <div id="tool-settings-container" style="margin-top: 15px;">
                    <!-- Блок: ПОИСК -->
                    <div id="pane-search" class="tool-pane">
                        <div class="form-row-simple">
                            <label>Объект:</label>
                            <div class="segmented-control">
                                <label><input type="radio" name="s-obj" value="msg" checked><span>Сообщения</span></label>
                                <label><input type="radio" name="s-obj" value="user"><span>Люди</span></label>
                            </div>
                        </div>
                        <div class="form-row-simple">
                            <label>Движок:</label>
                            <div class="segmented-control">
                                <label><input type="radio" name="s-eng" value="simple" checked><span>Простой</span></label>
                                <label><input type="radio" name="s-eng" value="ai"><span>ИИ (Смысл)</span></label>
                            </div>
                        </div>
                        <input type="text" id="search-query" placeholder="Что ищем?">
                    </div>

                    <!-- Блок: ИИ-ЧАТ -->
                    <div id="pane-chat" class="tool-pane" style="display:none">
                        <p style="font-size: 11px; color: var(--hint-color); margin-bottom: 8px;">Задайте вопрос по архиву выбранных групп:</p>
                        <textarea id="ai-chat-prompt" placeholder="Например: О чем спорили вчера в чате автолюбителей?" style="width:100%; height:80px; border-radius:8px; padding:10px; border:1px solid rgba(0,0,0,0.1); background:var(--secondary-bg); color:var(--text-color); font-family:inherit;"></textarea>
                    </div>

                    <!-- Блок: АНАЛИЗ -->
                    <div id="pane-analysis" class="tool-pane" style="display:none">
                        <div class="form-row-simple">
                            <label>Инструмент:</label>
                            <select id="analysis-tool" style="width: 100%; padding: 8px; border-radius: 8px;">
                                <option value="graph">Социальный граф</option>
                                <option value="experts">Топ экспертов</option>
                                <option value="activity">График активности</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button class="btn-primary" id="main-action-btn" style="margin-top: 15px;" onclick="runMainTool()">НАЙТИ</button>
            </div>
        </div>


			
			
			<!-- Гармошка 4: РЕЗУЛЬТАТ -->
        <div class="accordion" id="result-section">
            <div class="accordion-header">
                <span class="step-num">4</span>

                <h3>РЕЗУЛЬТАТ</h3>
                <span class="status-badge" id="result-count">0</span>
            </div>
            <div class="accordion-content">
<div class="result-actions" style="display: none; justify-content: flex-end; gap: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; margin-bottom: 10px;">
                    <span style="font-size: 11px; color: var(--hint-color); align-self: center; margin-right: auto;">Экспорт:</span>
                    
                    <div class="export-btn" onclick="startExport('excel')">
                        <img src="/icons/file.svg" alt="XLS">
                        <span>XLSX</span>
                    </div>

                    <div class="export-btn" onclick="startExport('pdf')">
                        <img src="/icons/file.svg" alt="PDF">
                        <span>PDF</span>
                    </div>

                    <div class="export-btn" onclick="startExport('markdown')">
                        <img src="/icons/file.svg" alt="MD">
                        <span>MD</span>
                    </div>
					
					<div class="export-btn" onclick="startExport('txt')">
                        <img src="/static/icons/file.svg" alt="TXT">
                        <span>TXT</span>
                    </div>

                    <div class="export-btn" onclick="startExport('html')">
                        <img src="/static/icons/file.svg" alt="HTML">
                        <span>HTML</span>
                    </div>
					
                </div>
                <div id="results-container">
				</div>
				</div>
        </div>
    </main>

    <!-- Подключаем JS-библиотеку Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="ws_client.js?v=128"></script>
    <script src="global.js?v=130"></script>
    <script src="api.js?v=130"></script>
    <script src="ui.js?v=133"></script>
    <script src="app.js?v=133"></script>
</body>
</html>
