<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleSift AI Search</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header-wrapper">
        <div id="app-header">TeleSift AI</div>
    </div>

    <!-- ГАРМОШКА 1: ИСТОЧНИКИ -->
    <div class="accordion active" id="acc-sources">
        <div class="acc-header" onclick="toggleAcc('acc-sources')">
            <span class="step">1</span> ИСТОЧНИКИ <span class="badge" id="count-sources">0</span>
        </div>
        <div class="acc-body">
            <div id="sources-list" class="list-container">
                <!-- Группы загрузятся из API -->
                <div class="loader"></div>
            </div>
            <button class="btn-add" onclick="addNewSource()">+ Добавить группу</button>
        </div>
    </div>

    <!-- ГАРМОШКА 2: ДЕЙСТВИЕ -->
    <div class="accordion" id="acc-action">
        <div class="acc-header" onclick="toggleAcc('acc-action')">
            <span class="step">2</span> ДЕЙСТВИЕ
        </div>
        <div class="acc-body">
            <input type="text" id="search-input" placeholder="Поиск (например: сельско-)">
            <div class="filter-row">
                <input type="date" id="date-from">
                <input type="date" id="date-to">
            </div>
            <button class="main-button" onclick="runSearch()">НАЙТИ</button>
        </div>
    </div>

    <!-- ГАРМОШКА 3: РЕЗУЛЬТАТ -->
    <div class="accordion" id="acc-results">
        <div class="acc-header" onclick="toggleAcc('acc-results')">
            <span class="step">3</span> РЕЗУЛЬТАТ <span class="badge" id="count-results">0</span>
        </div>
        <div class="acc-body">
            <div id="results-list">
                <p class="hint">Настройте поиск и нажмите кнопку найти</p>
            </div>
            <button id="export-btn" class="btn-export" style="display:none" onclick="exportResults()">Скачать .MD</button>
        </div>
    </div>

    <script src="app.js?v=2.0"></script>
</body>
</html>
